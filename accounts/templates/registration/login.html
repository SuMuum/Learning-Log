{% extends 'learning_logs/base.html' %} 
{% load django_bootstrap5 %} 

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card bg-white p-5 shadow-sm border-0">
      <h2 class="serif-text text-center fw-bold mb-4" style="color: var(--primary-color);">登堂入室</h2>
      <form action="{% url 'accounts:login' %}" method="post">
        {% csrf_token %} 
        {% bootstrap_form form %} 
        <div class="d-grid gap-2 mt-5">
          <button type="submit" class="btn btn-primary rounded-pill btn-lg shadow-sm">登 录</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock content %}
