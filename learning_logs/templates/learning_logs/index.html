{% extends "learning_logs/base.html" %} 

{% block page_header %}
<div class="p-5 mb-4 bg-light border rounded-3 text-center">
  <div class="container-fluid py-4">
    <h1 class="display-3 fw-bold">Track your learning.</h1>

    <p class="lead col-md-8 mx-auto fs-4 text-muted mt-3">
      Make your own Learning Log, and keep a list of topics you're learning
      about. Whenever you learn something new about a topic, make an entry
      summarizing what you've learned.
    </p>

    <a class="btn btn-primary btn-lg mt-4 px-5" href="{% url 'accounts:register' %}">Register &raquo;</a>
  </div>
</div>
{% endblock page_header %}
