{% extends 'learning_logs/base.html' %} 

{% block page_header %} 
  <h1>Topics</h1> 
{% endblock page_header %} 

{% block content %} 
  <ul class="list-group border-bottom pb-4 mb-4"> 
    {% for topic in topics %}       
      <li class="list-group-item border-0"> 
        <a href="{% url 'learning_logs:topic' topic.id %}" class="text-decoration-none fs-5 fw-semibold"> 
          {{ topic.text }}
        </a> 
      </li> 
    {% empty %} 
      <li class="list-group-item border-0 text-muted">No topics have been added yet.</li> 
    {% endfor %} 
  </ul> 
  <a href="{% url 'learning_logs:new_topic' %}" class="btn btn-primary">Add a new topic</a> 
{% endblock content %}
